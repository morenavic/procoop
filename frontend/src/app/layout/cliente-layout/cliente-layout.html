<div class="cliente-contenedor">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-izquierda">
      <button class="btn-hamburguesa" (click)="toggleMenu()" aria-label="Menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <div class="topbar-logo">
        <span class="logo-icono">⬡</span>
        <span class="logo-nombre">Procoop</span>
      </div>
    </div>

    <div class="topbar-usuario">
      <div class="usuario-avatar">
        {{ usuario()?.nombreUsuario?.charAt(0)?.toUpperCase() }}
      </div>
      <span class="usuario-nombre">{{ usuario()?.nombreUsuario }}</span>
    </div>
  </header>

  <!-- Overlay para cerrar el menú -->
  @if (menuAbierto()) {
    <div class="overlay" (click)="cerrarMenu()"></div>
  }

  <!-- Sidebar deslizante -->
  <aside class="sidebar" [class.abierto]="menuAbierto()">
    <div class="sidebar-encabezado">
      <div class="sidebar-logo">
        <span class="logo-icono">⬡</span>
        <span class="logo-nombre">Procoop</span>
      </div>
      <button class="btn-cerrar-menu" (click)="cerrarMenu()" aria-label="Cerrar menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of itemsNavegacion; track item.ruta) {
        <a
          [routerLink]="item.ruta"
          class="sidebar-nav-item"
          [class.activo]="esRutaActiva(item.ruta)"
        >
          <span class="nav-icono">
            <ng-container [ngSwitch]="item.icono">
              <svg *ngSwitchCase="'inicio'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
              <svg *ngSwitchCase="'perfil'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <svg
                *ngSwitchCase="'contrasenia'"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <svg
                *ngSwitchCase="'documentos'"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                />
              </svg>
            </ng-container>
          </span>
          <span class="nav-etiqueta">{{ item.etiqueta }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-pie">
      <button class="btn-salir" (click)="cerrarSesion()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="cliente-contenido">
    <router-outlet />
    <!-- Chatbot flotante -->
    <app-chatbot />
  </main>
</div>
