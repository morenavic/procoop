<div class="admin-contenedor" [class.sidebar-colapsado]="!sidebarAbierto()">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-encabezado">
      <span class="sidebar-logo-icono">⬡</span>
      <span class="sidebar-logo-nombre">Procoop</span>
    </div>

    <nav class="sidebar-nav">
      @for (item of itemsNavegacion; track item.ruta) {
        <a
          [routerLink]="item.ruta"
          class="sidebar-nav-item"
          [class.activo]="esRutaActiva(item.ruta)"
        >
          <span class="nav-icono">
            <ng-container [ngSwitch]="item.icono">
              <svg *ngSwitchCase="'inicio'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <svg *ngSwitchCase="'novedades'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              <svg *ngSwitchCase="'productos'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              </svg>
              <svg *ngSwitchCase="'servicios'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
              </svg>
              <svg *ngSwitchCase="'clientes'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <svg *ngSwitchCase="'documentos'" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </ng-container>
          </span>
          <span class="nav-etiqueta">{{ item.etiqueta }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-pie">
      <button class="btn-salir" (click)="cerrarSesion()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Cerrar sesión</span>
      </button>
    </div>

  </aside>

  <!-- Área principal -->
  <div class="admin-principal">

    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar-toggle" (click)="toggleSidebar()" aria-label="Alternar menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="topbar-usuario">
        <div class="topbar-avatar">
          {{ usuario()?.nombreUsuario?.charAt(0)?.toUpperCase() }}
        </div>
        <span class="topbar-nombre">{{ usuario()?.nombreUsuario }}</span>
      </div>
    </header>

    <!-- Contenido dinámico -->
    <main class="admin-contenido">
      <router-outlet />
    </main>

  </div>

</div>
