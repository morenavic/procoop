spring:
  application:
    name: procoop-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/procoop}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: file:${UPLOADS_DIR:uploads/}

server:
  port: ${PORT:8080}

app:
  uploads:
    dir: ${UPLOADS_DIR:uploads/}
  jwt:
    secret: ${JWT_SECRET:clave-secreta-temporal-cambiar-en-produccion}
    expiration: ${JWT_EXPIRATION:86400000}
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}

logging:
  level:
    ar.edu.undec.procoop: INFO