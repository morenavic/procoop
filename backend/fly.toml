app = "procoop-api"
primary_region = "gru"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"
SPRING_PROFILES_ACTIVE = "prod"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"